<!DOCTYPE html>
<html>
<body>

<h3>Number Operations</h3>

<input type="number" id="num" placeholder="Enter number">
<br><br>

<button onclick="fact()">Factorial</button>
<button onclick="fib()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="pal()">Palindrome</button>

<p id="res"></p>

<script>
function fact() {
    let n = +num.value, f = 1;
    for (let i = 1; i <= n; i++) f *= i;
    res.innerHTML += "Factorial: " + f + "<br>";
}

function fib() {
    let n = +num.value, a = 0, b = 1, out = "";
    while (a <= n) {
        out += a + " ";
        [a, b] = [b, a + b];
    }
    res.innerHTML += "Fibonacci: " + out + "<br>";
}

function prime() {
    let n = +num.value, out = "";
    for (let i = 2; i <= n; i++) {
        let p = 1;
        for (let j = 2; j < i; j++) if (i % j == 0) p = 0;
        if (p) out += i + " ";
    }
    res.innerHTML += "Primes: " + out + "<br>";
}

function pal() {
    let n = num.value;
    let rev = n.split("").reverse().join("");
    res.innerHTML += "Palindrome: " + (n == rev ? "Yes" : "No") + "<br>";
}
</script>

</body>
</html>
