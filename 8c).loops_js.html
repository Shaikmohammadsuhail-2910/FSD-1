<!DOCTYPE html>
<html>
<head>
    <title>Loops Example in JavaScript</title>
</head>
<body>

    <h2>Printing Numbers from 1 to 10</h2>

    <script>

        document.write("<h3>Using for loop:</h3>");
        for (var i = 1; i <= 10; i++) {
            document.write(i + "<br>");
        }


        document.write("<h3>Using while loop:</h3>");
        var j = 1;
        while (j <= 10) {
            document.write(j + "<br>");
            j++;
        }


        document.write("<h3>Using do-while loop:</h3>");
        var k = 1;
        do {
            document.write(k + "<br>");
            k++;
        } while (k <= 10);

    </script>

</body>
</html>
