<!DOCTYPE html>
<html>
<head>
    <title>Find Larger Number</title>
</head>
<body>

<h2>Check Larger Number</h2>

<script>

// taking three numbers from user
var num1 = parseInt(prompt("Enter first integer:"));
var num2 = parseInt(prompt("Enter second integer:"));
var num3 = parseInt(prompt("Enter third integer:"));

// checking largest number
if(num1 > num2 && num1 > num3)
{
    document.write("<h3>" + num1 + " LARGER NUMBER</h3>");
}
else if(num2 > num1 && num2 > num3)
{
    document.write("<h3>" + num2 + " LARGER NUMBER</h3>");
}
else if(num3 > num1 && num3 > num2)
{
    document.write("<h3>" + num3 + " LARGER NUMBER</h3>");
}
else
{
    document.write("<h3>EQUAL NUMBERS</h3>");
}

</script>

</body>
</html>
