<!DOCTYPE html>
<html>
<head>
    <title>Math Example</title>
</head>
<body>

<h2>Math Output</h2>
<p id="result"></p>

<script>
let num = 25;

document.getElementById("result").innerHTML =
    "Square Root: " + Math.sqrt(num) + "<br>" +
    "Random: " + Math.random() + "<br>" +
    "Max: " + Math.max(10, 20, 30);
</script>

</body>
</html>
